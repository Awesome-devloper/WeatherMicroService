name: CI

on:
  push:
    branches: ["master"]
  pull_request:
    branches: ["master"]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "5.0.x"
          cache: true

      - name: Restore
        run: dotnet restore "WeatherMicro.sln"

      - name: Build
        run: dotnet build "WeatherMicro.sln" -c Release --no-restore

      - name: Test
        run: dotnet test "WeatherMicro.sln" -c Release --no-build
